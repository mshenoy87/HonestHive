{% extends 'base.html' %}

{% block head_title %}
Honest Hive
{% endblock %}

{% block content %}

<h1>
    Welcome To Honest Hive
</h2>
<div id="Waggles">

</div>

<script>
    const waggleElements = document.getElementById("Waggles");
    const xmlRequest = new XMLHttpRequest();
    const method = 'GET';
    const url = "/Waggles";
    const responseType = "json";

    function didLike(waggle_id, currentLikes) {
        currentLikes += 1;
        console.log(waggle_id + "---" + currentLikes + " ------ " + (currentLikes+= 1));
    }

    function renderLikeButton(Waggle) {
        return "<button class='btn btn-primary' onclick='didLike(" + Waggle.id + "," + Waggle.likes + ")'>" + Waggle.likes + " Likes</button>";
    }

    function formatWaggles(Waggle) {
        return "<div class='mb-4 waggle' id='waggle-" 
            + Waggle.id +"'><p>" + Waggle.waggleText
            + "</p><div class=btnGroup>" + renderLikeButton(Waggle) + "</div></div>";
    }

    xmlRequest.responseType = responseType;
    xmlRequest.open(method, url);
    xmlRequest.onload = function() {
        const xmlServerResponse = xmlRequest.response;
        var listedItems = xmlServerResponse.response;

        waggleElements.innerHtml = "";
        var finalString = "";
        for (var i = listedItems.length - 1; i >= 0; i--) {
            currentItem = formatWaggles(listedItems[i]);
            finalString += currentItem;
        }
        waggleElements.innerHTML += finalString;
        console.log(finalString)
    }

    xmlRequest.send()

</script>
{% endblock content %}
